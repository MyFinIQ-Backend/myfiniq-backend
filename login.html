<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – MyFinIQ</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #faf9f6;
      color: #222;
    }

    .container.auth-container {
      max-width: 520px;
      margin: 60px auto;
      padding: 0 20px;
    }

    .login-card {
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      border: 1px solid #eee;
      padding: 34px 28px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2.2rem;
      color: #111;
    }

    .intro {
      color: #555;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .btn-gold {
      width: 100%;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #d4af37, #b8860b);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      padding: 15px 20px;
      cursor: pointer;
      margin-top: 8px;
    }

    .site-footer {
      background: #111827;
      color: #fff;
      text-align: center;
      padding: 18px 20px;
      margin-top: 60px;
    }

    #loginMessage {
      margin-top: 16px;
      color: #9f1c1c;
      font-weight: 600;
    }
  </style>
</head>
<body data-page="login">
  <main class="container auth-container">
    <section class="login-card">
      <div class="kicker">Mitgliederbereich</div>
      <h1>Willkommen zurück</h1>
      <p class="intro">
        Logge dich ein, um auf dein Dashboard, deine PRO-Module und deinen ELITE-Bereich zuzugreifen.
      </p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">E-Mail-Adresse</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="deine@email.de"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Passwort</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Dein Passwort"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" class="btn-gold">
          Jetzt einloggen
        </button>
      </form>

      <div class="helper-links">
        <a href="registrieren.html">Noch kein Konto? Jetzt registrieren</a>
        <a href="premium.html">Zu den Premium-Plänen</a>
      </div>

      <div id="loginMessage"></div>
    </section>
  </main>

  <footer class="site-footer">
    © 2026 MyFinIQ
  </footer>

  <script type="module" src="auth.js"></script>
</body>
</html>
